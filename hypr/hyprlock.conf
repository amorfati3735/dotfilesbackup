source = ~/.config/hypr/hyprlock/colors.conf

general {
    immediate_render = true
    grace = 0
}

# Blurred wallpaper background
background {
    monitor =
    path = $background_image
    blur_passes = 4
    blur_size = 8
    brightness = 0.7
    vibrancy = 0.2
    vibrancy_darkness = 0.3
}

# Clock — large, top-center
label {
    monitor =
    text = $TIME
    color = $text_color
    font_size = 80
    font_family = Google Sans Flex Light

    position = 0, 160
    halign = center
    valign = center
}

# Date — below clock
label {
    monitor =
    text = cmd[update:5000] date +"%A, %B %d"
    color = $text_color
    font_size = 18
    font_family = Google Sans Flex

    position = 0, 90
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    color = $text_color
    font_size = 16
    font_family = Google Sans Flex Medium

    position = 0, 30
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = true
    placeholder_text = <i>Enter password...</i>
    rounding = 12

    position = 0, -30
    halign = center
    valign = center
}

# Caps Lock warning
label {
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = rgba(ff6b6bFF)
    font_size = 13
    font_family = Google Sans Flex Medium

    position = 0, -70
    halign = center
    valign = center
}

# Keyboard layout
label {
    monitor =
    text = $LAYOUT
    color = $entry_border_color
    font_size = 12
    font_family = Google Sans Flex

    position = -30, 30
    halign = right
    valign = bottom
}

# Status
label {
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $entry_border_color
    font_size = 12
    font_family = Google Sans Flex

    position = 30, -30
    halign = left
    valign = top
}

general {
    col.active_border = rgba(8f928577)
    col.inactive_border = rgba(44483d55)
}

misc {
    background_color = rgba(12140eFF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(12140eFF)
        col.text = rgba(e2e3d8FF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(e2e3d8), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(e2e3d8), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(e2e3d8), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(b2d189AA) rgba(b2d18977), match:pin 1

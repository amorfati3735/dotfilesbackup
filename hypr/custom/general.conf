# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

# monitor=,addreserved, 0, 0, 0, 0 # Custom reserved area

# HDMI port: mirror display. To see device name, use `hyprctl monitors`

# macOS Tahoe-style animations
animations {
    enabled = true

    # macOS spring curves
    bezier = tahoeEaseOut, 0.16, 1, 0.3, 1
    bezier = tahoeSpring, 0.22, 1.1, 0.36, 1
    bezier = tahoePopIn, 0.1, 0.9, 0.2, 1.05
    bezier = tahoeDecel, 0.05, 0.85, 0.1, 1
    bezier = tahoeAccel, 0.4, 0, 1, 1

    # windows
    animation = windowsIn, 1, 4, tahoePopIn, popin 85%
    animation = windowsOut, 1, 4, tahoeEaseOut, popin 90%
    animation = windowsMove, 1, 4, tahoeSpring, slide
    animation = fadeIn, 1, 3.5, tahoeDecel
    animation = fadeOut, 1, 3, tahoeDecel

    # layers
    animation = layersIn, 1, 3, tahoePopIn, popin 90%
    animation = layersOut, 1, 2.5, tahoeAccel, popin 92%
    animation = fadeLayersIn, 1, 2, tahoeDecel
    animation = fadeLayersOut, 1, 3, tahoeDecel

    # workspaces — smooth horizontal slide
    animation = workspaces, 1, 5, tahoeSpring, slide
    animation = specialWorkspaceIn, 1, 4, tahoeSpring, slidevert
    animation = specialWorkspaceOut, 1, 3, tahoeAccel, slidevert

    # border + zoom
    animation = border, 1, 8, tahoeDecel
    animation = zoomFactor, 1, 4, tahoeDecel
}

# Tahoe-style decoration
decoration {
    rounding = 14
    rounding_power = 2.8

    blur {
        enabled = true
        size = 10
        passes = 4
        noise = 0.04
        contrast = 0.85
        brightness = 0.9
        vibrancy = 0.3
        vibrancy_darkness = 0.3
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 35
        offset = 0 3
        render_power = 4
        color = rgba(00000035)
    }

    dim_inactive = false
    dim_strength = 0.08
}

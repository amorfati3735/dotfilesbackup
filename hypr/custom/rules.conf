# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# ######## Window rules ########

# Kitty frosted acrylic
windowrule = match:class ^(kitty)$, no_blur off
windowrule = opacity 0.95 override 0.90 override, match:class kitty

# Uncomment to apply global transparency to all windows:
# windowrule = opacity 0.89 override 0.89 override, match:class .*

# Zen Browser — frosted glass blur, but disable on YouTube for smooth video
windowrule = opacity 0.85 override 0.80 override, match:class ^(zen)$, match:title !YouTube
windowrule = no_blur off, match:class ^(zen)$, match:title !YouTube
windowrule = opacity 1.0 override 1.0 override, match:class ^(zen)$, match:title YouTube
windowrule = no_blur on, match:class ^(zen)$, match:title YouTube

# ChatGPT scratchpad — frosted glass blur
windowrule = workspace special silent, match:class ^(chatgpt-zen)$
windowrule = no_initial_focus on, match:class ^(chatgpt-zen)$
windowrule = suppress_event activate, match:class ^(chatgpt-zen)$
windowrule = opacity 0.85 override 0.80 override, match:class ^(chatgpt-zen)$
windowrule = no_blur off, match:class ^(chatgpt-zen)$

# Obsidian scratchpad — frosted glass blur
windowrule = workspace special silent, match:class ^(obsidian)$
windowrule = no_initial_focus on, match:class ^(obsidian)$
windowrule = suppress_event activate, match:class ^(obsidian)$
windowrule = opacity 0.85 override 0.80 override, match:class ^(obsidian)$
windowrule = no_blur off, match:class ^(obsidian)$

# Script launcher (small centered Dolphin)
windowrule = match:title ^(Script Launcher)$, float on
windowrule = match:title ^(Script Launcher)$, size 550 450
windowrule = match:title ^(Script Launcher)$, center on

# Spotify — frosted glass blur
windowrule = opacity 0.85 override 0.80 override, match:class ^(Spotify)$
windowrule = no_blur off, match:class ^(Spotify)$

# Antigravity (Gemini) — frosted glass blur
windowrule = opacity 0.85 override 0.80 override, match:class ^(antigravity)$
windowrule = no_blur off, match:class ^(antigravity)$

# Foliate — frosted glass blur
windowrule = opacity 0.85 override 0.80 override, match:class ^(com.github.johnfactotum.Foliate)$
windowrule = no_blur off, match:class ^(com.github.johnfactotum.Foliate)$

# Rofi — frosted glass blur
layerrule = match:namespace rofi, blur on
layerrule = match:namespace rofi, ignore_alpha 0.3

# Disable blur for all xwayland apps
# windowrule = no_blur on, match:xwayland 1


# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Input method
# exec-once = fcitx5

# Auto-switch refresh rate based on power profile
exec-once = ~/.config/hypr/custom/scripts/power-profile-monitor.sh

# Night dimmer daemon (software brightness control)
exec-once = wl-gammarelay-rs

# Deferred apps — load behind lock screen, staggered to reduce resource contention
exec-once = sleep 3 && vicinae
# exec-once = sleep 4 && ~/.config/hypr/custom/scripts/chatgpt-scratchpad.sh
exec-once = sleep 10 && hyprctl dispatch -- exec "[noinitialfocus] obsidian"
